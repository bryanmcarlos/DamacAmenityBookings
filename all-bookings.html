<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings - Damac Hills Tennis</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navigation">
            <h1 class="nav-title">🎾 Tennis Bookings</h1>
            <div class="nav-buttons">
                <a href="today-bookings.html" class="nav-button">Today</a>
                <a href="all-bookings.html" class="nav-button active">All Bookings</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h2>Tennis Bookings</h2>
                <div class="header-actions">
                    <button id="filterBtn" class="icon-button" onclick="toggleFilterMenu()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" y1="21" x2="4" y2="14"/>
                            <line x1="4" y1="10" x2="4" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12" y2="3"/>
                            <line x1="20" y1="21" x2="20" y2="16"/>
                            <line x1="20" y1="12" x2="20" y2="3"/>
                            <circle cx="4" cy="12" r="2"/>
                            <circle cx="12" cy="10" r="2"/>
                            <circle cx="20" cy="14" r="2"/>
                        </svg>
                    </button>
                    <button id="refreshBtn" class="icon-button" onclick="refreshBookings()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Filter Menu -->
            <div id="filterMenu" class="filter-menu" style="display: none;">
                <button onclick="selectFilter(null)" class="filter-option">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    All Accounts
                </button>
                <div class="filter-divider"></div>
                <button onclick="selectFilter('Jess Santiago')" class="filter-option">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Jess Santiago
                </button>
                <button onclick="selectFilter('Reswee')" class="filter-option">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Reswee
                </button>
                <button onclick="selectFilter('Bryan Carlos')" class="filter-option">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    Bryan Carlos
                </button>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Loading bookings...</p>
            </div>

            <!-- Stats Card -->
            <div id="statsCard" class="stats-card" style="display: none;">
                <h3>Booking Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <svg class="stat-icon blue" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6" stroke="white" stroke-width="2"/>
                            <line x1="8" y1="2" x2="8" y2="6" stroke="white" stroke-width="2"/>
                            <line x1="3" y1="10" x2="21" y2="10" stroke="white" stroke-width="2"/>
                        </svg>
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat-item">
                        <svg class="stat-icon green" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14" stroke="white" stroke-width="2" fill="none"/>
                        </svg>
                        <div class="stat-value" id="statUpcoming">0</div>
                        <div class="stat-label">Upcoming</div>
                    </div>
                    <div class="stat-item">
                        <svg class="stat-icon orange" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        <div class="stat-value" id="statPremium">0</div>
                        <div class="stat-label">Premium</div>
                    </div>
                    <div class="stat-item">
                        <svg class="stat-icon purple" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01" stroke="white" stroke-width="2" fill="none"/>
                        </svg>
                        <div class="stat-value" id="statConfirmed">0</div>
                        <div class="stat-label">Confirmed</div>
                    </div>
                </div>
            </div>

            <!-- Filter Banner -->
            <div id="filterBanner" class="filter-banner" style="display: none;">
                <svg class="banner-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <line x1="4" y1="21" x2="4" y2="14"/>
                    <line x1="4" y1="10" x2="4" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12" y2="3"/>
                    <line x1="20" y1="21" x2="20" y2="16"/>
                    <line x1="20" y1="12" x2="20" y2="3"/>
                    <circle cx="4" cy="12" r="2"/>
                    <circle cx="12" cy="10" r="2"/>
                    <circle cx="20" cy="14" r="2"/>
                </svg>
                <span id="filterText">Showing all bookings</span>
                <button onclick="clearFilter()" class="clear-filter-btn">Clear</button>
            </div>

            <!-- Bookings List -->
            <div id="bookingsList" class="bookings-list"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <svg class="empty-icon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <h3>No Bookings Found</h3>
                <p>You don't have any tennis court bookings yet.</p>
                <button onclick="refreshBookings()" class="primary-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh
                </button>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error-state" style="display: none;">
                <svg class="error-icon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                <h3>Error Loading Bookings</h3>
                <p id="errorMessage">Failed to load bookings</p>
                <button onclick="refreshBookings()" class="primary-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Retry
                </button>
            </div>
        </main>
    </div>

    <!-- Security View Modal -->
    <div id="securityModal" class="modal">
        <div class="modal-content security-view">
            <button class="modal-close" onclick="closeSecurityView()">✕</button>
            <div id="securityContent"></div>
        </div>
    </div>

    <!-- Booking Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content detail-view">
            <button class="modal-close" onclick="closeDetailView()">✕</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="all-bookings.js"></script>
</body>
</html>
