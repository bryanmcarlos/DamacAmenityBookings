<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damac Hills 2 Tennis Bookings</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, var(--primary-color), rgba(0, 122, 255, 0.8));
            color: white;
            border-radius: var(--radius-lg);
            margin: var(--spacing-lg);
        }
        
        .hero h1 {
            font-size: 42px;
            margin-bottom: var(--spacing-md);
        }
        
        .hero p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: var(--spacing-xl);
        }
        
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
            padding: var(--spacing-lg);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .quick-link-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: var(--shadow-md);
            transition: all 0.3s;
        }
        
        .quick-link-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        
        .quick-link-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto var(--spacing-md);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .quick-link-icon.today {
            background: linear-gradient(135deg, var(--success-color), rgba(52, 199, 89, 0.8));
        }
        
        .quick-link-icon.all {
            background: linear-gradient(135deg, var(--primary-color), rgba(0, 122, 255, 0.8));
        }
        
        .quick-link-card h3 {
            font-size: 22px;
            margin-bottom: var(--spacing-xs);
        }
        
        .quick-link-card p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .features {
            padding: var(--spacing-xl) var(--spacing-lg);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .features h2 {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            font-size: 28px;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
        }
        
        .feature-item {
            text-align: center;
        }
        
        .feature-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto var(--spacing-sm);
            color: var(--primary-color);
        }
        
        .feature-item h4 {
            font-size: 16px;
            margin-bottom: var(--spacing-xs);
        }
        
        .feature-item p {
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Hero Section -->
        <div class="hero">
            <h1>🎾 Tennis Bookings</h1>
            <p>Damac Hills 2 tennis court bookings</p>
        </div>
        
        <!-- Quick Links -->
        <div class="quick-links">
            <a href="today-bookings.html" class="quick-link-card">
                <div class="quick-link-icon today">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/>
                    </svg>
                </div>
                <h3>Today's Bookings</h3>
                <p>Quick access to your tennis court bookings for today</p>
            </a>
            
            <a href="all-bookings.html" class="quick-link-card">
                <div class="quick-link-icon all">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                        <line x1="9" y1="12" x2="15" y2="12"/>
                        <line x1="9" y1="16" x2="15" y2="16"/>
                    </svg>
                </div>
                <h3>All Bookings</h3>
                <p>View all tennis court bookings with filtering and stats</p>
            </a>
        </div>
        
        
        
        <!-- Footer -->
        <div style="text-align: center; padding: var(--spacing-xl); color: var(--text-secondary);">
            <p style="font-size: 14px;">Damac Hills 2 Tennis Booking</p>
            <p style="font-size: 12px; margin-top: 8px;">Bryan Carlos</p>
        </div>
    </div>
</body>
</html>
